version: 2

models:
  - name: stg_orders
    description: "Staging model for customer orders."

    columns:
      - name: order_id
        description: "Unique identifier for an order."
        data_tests:
          - not_null
          - unique

      - name: customer_id
        description: "Identifier of the customer who placed the order."
        data_tests:
          - not_null

      - name: order_status
        description: "Current status of the order."

      - name: order_purchase_timestamp
        description: "Timestamp when the order was placed."

      - name: order_approved_at
        description: "Timestamp when the order was approved."

      - name: order_delivered_carrier_date
        description: "Timestamp when the carrier received the order."

      - name: order_delivered_customer_date
        description: "Timestamp when the customer received the order."

      - name: order_estimated_delivery_date
        description: "Estimated delivery date."


  - name: stg_customers
    description: "Staging model for customer information."

    columns:
      - name: customer_id
        description: "Unique identifier assigned to each customer record."
        data_tests:
          - not_null
          - unique

      - name: customer_unique_id
        description: "Business identifier representing the same customer across multiple orders."
        data_tests:
          - not_null

      - name: customer_zip_code_prefix
        description: "Customer ZIP code prefix."

      - name: customer_city
        description: "Customer city."

      - name: customer_state
        description: "Customer state."


  - name: stg_products
    description: "Staging model for product information."

    columns:
      - name: product_id
        description: "Unique identifier for a product."
        data_tests:
          - not_null
          - unique

      - name: product_category_name
        description: "Portuguese product category."

      - name: product_name_lenght
        description: "Length of the product name."

      - name: product_description_lenght
        description: "Length of the product description."

      - name: product_photos_qty
        description: "Number of product photos."

      - name: product_weight_g
        description: "Product weight in grams."

      - name: product_length_cm
        description: "Product length in centimeters."

      - name: product_height_cm
        description: "Product height in centimeters."

      - name: product_width_cm
        description: "Product width in centimeters."


  - name: stg_order_items
    description: "Staging model containing individual items within each order."

    columns:
      - name: order_id
        description: "Identifier of the order."
        data_tests:
          - not_null

      - name: order_item_id
        description: "Sequential item number within an order."
        data_tests:
          - not_null

      - name: product_id
        description: "Identifier of the purchased product."
        data_tests:
          - not_null

      - name: seller_id
        description: "Identifier of the seller fulfilling the order."
        data_tests:
          - not_null

      - name: shipping_limit_date
        description: "Latest date by which the seller should ship the item."

      - name: price
        description: "Price of the product."

      - name: freight_value
        description: "Shipping cost charged for the item."