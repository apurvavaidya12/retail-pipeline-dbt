version: 2

models:
  - name: int_order_details
    description: >
      Intermediate model combining orders, order items, and products.
      Each row represents a single product purchased within an order.
      This model serves as the foundation for building fact and dimension
      tables in the Gold layer.

    columns:
      - name: order_id
        description: "Unique identifier of the order."

      - name: customer_id
        description: "Identifier of the customer who placed the order."

      - name: order_status
        description: "Current status of the order."

      - name: order_purchase_timestamp
        description: "Timestamp when the order was placed."

      - name: order_approved_at
        description: "Timestamp when the order was approved."

      - name: order_delivered_carrier_date
        description: "Timestamp when the carrier received the order."

      - name: order_delivered_customer_date
        description: "Timestamp when the customer received the order."

      - name: order_estimated_delivery_date
        description: "Estimated delivery date."

      - name: order_item_id
        description: "Sequential item number within the order."

      - name: product_id
        description: "Identifier of the purchased product."

      - name: seller_id
        description: "Identifier of the seller fulfilling the order."

      - name: shipping_limit_date
        description: "Latest date by which the seller should ship the item."

      - name: price
        description: "Price paid for the product."

      - name: freight_value
        description: "Shipping cost charged for the product."

      - name: product_category_name
        description: "Portuguese name of the product category."

      - name: product_name_lenght
        description: "Length of the product name."

      - name: product_description_lenght
        description: "Length of the product description."

      - name: product_photos_qty
        description: "Number of product photos."

      - name: product_weight_g
        description: "Product weight in grams."

      - name: product_length_cm
        description: "Product length in centimeters."

      - name: product_height_cm
        description: "Product height in centimeters."

      - name: product_width_cm
        description: "Product width in centimeters."