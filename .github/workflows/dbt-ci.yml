name: dbt CI Pipeline

on:
  push:
    branches:
      - main

  workflow_dispatch:

jobs:
  dbt:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('packages.yml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dbt
        run: |
          python -m pip install --upgrade pip
          pip install dbt-snowflake==1.11.6

      - name: Install dbt packages
        run: dbt deps

      - name: Create profiles.yml
        run: |
          mkdir -p ~/.dbt
          cat > ~/.dbt/profiles.yml <<EOF
          retail_pipeline_dbt:
            target: dev
            outputs:
              dev:
                type: snowflake
                account: ${{ secrets.SNOWFLAKE_ACCOUNT }}
                user: ${{ secrets.SNOWFLAKE_USER }}
                password: ${{ secrets.SNOWFLAKE_PASSWORD }}
                role: DBT_ROLE
                warehouse: RETAIL_WH
                database: RETAIL_PIPELINE
                schema: dbt_dev
                threads: 4
          EOF

      - name: Run dbt seed
        run: dbt seed

      - name: Run dbt models
        run: dbt run

      - name: Run dbt tests
        run: dbt test